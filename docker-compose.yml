services:
  postgres:
    image: postgres:17-alpine
    container_name: newsfeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsfeed
      POSTGRES_PASSWORD: newsfeed_dev
      POSTGRES_DB: newsfeed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: newsfeed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: